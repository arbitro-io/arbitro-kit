name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Required gates: must pass ─────────────────────────────────────────
  build:
    name: build (features=${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["", "tokio"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build --lib --tests
          else
            cargo build --lib --tests --features ${{ matrix.features }}
          fi

  test:
    name: test (features=${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["", "tokio"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo test --lib
          else
            cargo test --lib --features ${{ matrix.features }}
          fi

  bench-compile:
    name: benches compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --no-run --features tokio

  # ── Informational: surface lints without blocking ─────────────────────
  clippy:
    name: clippy (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib --tests --features tokio

  fmt:
    name: rustfmt (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
